<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<title>Insights &amp; Newsroom — HNB Investment Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
/* ── Filter tabs ── */
.news-filters {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:var(--sp-m);
  padding-bottom:var(--sp-m);
  border-bottom:1px solid var(--line);
}
.news-filter-btn {
  padding:8px 20px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  border:1.5px solid var(--line);
  border-radius:100px;
  background:var(--card);
  color:var(--ink-2);
  cursor:pointer;
  font-family:var(--font);
  transition:all var(--dur-fast);
  white-space:nowrap;
}
.news-filter-btn:hover { border-color:var(--primary); color:var(--primary); }
.news-filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ── Result count ── */
.news-count {
  font-size:13px;
  color:var(--ink-3);
  margin-bottom:var(--sp-m);
  min-height:20px;
}

/* ── Grid wrapper (fades on page change) ── */
.news-grid-wrap { transition:opacity .22s ease; }
.news-grid-wrap.fading { opacity:0; pointer-events:none; }

/* ── Featured card ── */
.nc-featured {
  display:grid;
  grid-template-columns:1.5fr 1fr;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:calc(var(--radius) * 2);
  overflow:hidden;
  margin-bottom:var(--sp-m);
  min-height:340px;
  text-decoration:none;
  color:inherit;
  transition:box-shadow var(--dur-mid), transform var(--dur-mid);
}
.nc-featured:hover {
  box-shadow:0 16px 48px oklch(0.42 0.14 242/.13);
  transform:translateY(-2px);
}
.nc-featured-img {
  position:relative;
  overflow:hidden;
  min-height:300px;
}
.nc-featured-img img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .8s var(--ease-out);
}
.nc-featured:hover .nc-featured-img img { transform:scale(1.05); }
.nc-featured-img-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, oklch(0.19 0.013 250/.5) 0%, transparent 60%);
  pointer-events:none;
}
.nc-featured-badge {
  position:absolute;
  top:20px;
  left:20px;
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  background:var(--accent);
  color:#fff;
  padding:5px 12px;
  border-radius:100px;
}
.nc-featured-body {
  padding:var(--sp-l);
  display:flex;
  flex-direction:column;
  gap:14px;
  justify-content:center;
}
.nc-featured-tag {
  font-size:10px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent-d);
  display:inline-block;
  background:oklch(0.62 0.16 141/.10);
  padding:4px 12px;
  border-radius:100px;
  width:fit-content;
}
.nc-featured-title {
  font-size:clamp(17px, 2.2vw, 24px);
  font-weight:800;
  color:var(--ink);
  line-height:1.25;
}
.nc-featured-excerpt {
  font-size:14px;
  color:var(--ink-2);
  line-height:1.7;
}
.nc-featured-meta {
  font-size:12px;
  color:var(--ink-3);
  display:flex;
  align-items:center;
  gap:8px;
}
.nc-featured-meta::before {
  content:'';
  display:inline-block;
  width:3px;
  height:14px;
  background:var(--accent);
  border-radius:2px;
}
.nc-featured-cta {
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:700;
  color:#fff;
  background:var(--primary);
  padding:10px 20px;
  border-radius:var(--radius);
  width:fit-content;
  margin-top:4px;
  transition:background var(--dur-fast), gap var(--dur-fast);
}
.nc-featured:hover .nc-featured-cta { background:var(--primary-d); gap:12px; }

/* ── Cards grid ── */
.news-cards-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.nc {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:calc(var(--radius) * 2);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  text-decoration:none;
  color:inherit;
  transition:box-shadow var(--dur-mid), transform var(--dur-mid);
}
.nc:hover {
  box-shadow:0 10px 32px oklch(0.42 0.14 242/.11);
  transform:translateY(-4px);
}
.nc-img {
  position:relative;
  height:190px;
  overflow:hidden;
  background:var(--bg-2);
}
.nc-img img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .7s var(--ease-out);
}
.nc:hover .nc-img img { transform:scale(1.07); }
.nc-img-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to top, oklch(0.19 0.013 250/.35) 0%, transparent 55%);
  pointer-events:none;
}
.nc-body {
  padding:20px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.nc-tag {
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--primary);
}
.nc-title {
  font-size:15px;
  font-weight:700;
  color:var(--ink);
  line-height:1.35;
  flex:1;
}
.nc-footer {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--line);
}
.nc-meta { font-size:11px; color:var(--ink-3); }
.nc-read {
  font-size:12px;
  font-weight:700;
  color:var(--primary);
  display:inline-flex;
  align-items:center;
  gap:4px;
  transition:gap var(--dur-fast);
}
.nc:hover .nc-read { gap:8px; }

/* ── Empty state ── */
.news-empty {
  text-align:center;
  padding:var(--sp-xl) 0;
  color:var(--ink-3);
}
.news-empty svg { margin:0 auto var(--sp-m); opacity:.3; }
.news-empty p { font-size:15px; }

/* ── Pagination ── */
.news-pagination {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  margin-top:var(--sp-l);
  padding-top:var(--sp-m);
  border-top:1px solid var(--line);
  flex-wrap:wrap;
}
.pg-btn {
  min-width:42px;
  height:42px;
  padding:0 16px;
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  background:var(--card);
  color:var(--ink-2);
  font-size:13px;
  font-weight:600;
  font-family:var(--font);
  cursor:pointer;
  transition:all var(--dur-fast);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.pg-btn:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); background:oklch(0.42 0.14 242/.05); }
.pg-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.pg-btn:disabled { opacity:.3; cursor:not-allowed; }
.pg-ellipsis { color:var(--ink-3); font-size:13px; padding:0 4px; }

/* ── Responsive ── */
@media(max-width:1024px) {
  .nc-featured { grid-template-columns:1fr 1fr; min-height:280px; }
  .news-cards-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:768px) {
  .nc-featured { grid-template-columns:1fr; }
  .nc-featured-img { min-height:220px; }
  .nc-featured-body { padding:var(--sp-m); gap:12px; }
  .nc-featured-title { font-size:18px; }
  .news-cards-grid { grid-template-columns:1fr; }
  .news-filters { gap:6px; }
  .news-filter-btn { padding:7px 14px; font-size:10px; }
  .pg-btn { min-width:38px; height:38px; font-size:12px; padding:0 12px; }
}
@media(max-width:480px) {
  .nc-featured-body { padding:20px; }
}
</style>
</head>
<body class="tx-clean motion-full density-standard">

<div id="site-header"></div>
<script>window.siteRoot = './';</script>
<script src="./components/header.js"></script>

<div class="page-header"><div class="page-header-inner">
  <div class="page-header-eyebrow">Insights &amp; Newsroom</div>
  <h1 class="page-header-h1">Market intelligence from HNB Investment Bank.</h1>
  <p class="page-header-lead">Research, deal announcements, and company news — from our desk to yours.</p>
</div></div>

<main class="page-body">

<section id="news-archive-section" class="section-pad">
  <div class="section-inner">

    <!-- Filter tabs -->
    <div class="news-filters" role="tablist" aria-label="Filter articles by category">
      <button class="news-filter-btn active" data-cat="all" role="tab" aria-selected="true">All</button>
      <button class="news-filter-btn" data-cat="Corporate Finance" role="tab" aria-selected="false">Corporate Finance</button>
      <button class="news-filter-btn" data-cat="Market Commentary" role="tab" aria-selected="false">Market Commentary</button>
      <button class="news-filter-btn" data-cat="Partnership" role="tab" aria-selected="false">Partnership</button>
      <button class="news-filter-btn" data-cat="Company News" role="tab" aria-selected="false">Company News</button>
    </div>

    <!-- Result count -->
    <div class="news-count" id="news-count" aria-live="polite"></div>

    <!-- Dynamic grid -->
    <div class="news-grid-wrap" id="news-grid" aria-live="polite"></div>

    <!-- Pagination -->
    <nav class="news-pagination" id="news-pagination" aria-label="Article pagination"></nav>

  </div>
</section>

</main>

<div id="site-footer"></div>
<script src="./components/footer.js"></script>
<script src="assets/js/main.js"></script>

<script>
(function () {
  'use strict';

  /* ── Posts data ──────────────────────────────────────────────── */
  var POSTS = [
    {
      title:    'Empowering Your Progress — How HNB Investment Bank Is Driving the Evolution of Bespoke Investment Solutions',
      excerpt:  'How HNB Investment Bank is redefining personalised capital market access for the new generation of Sri Lankan investors.',
      category: 'Market Commentary',
      date:     'May 2026',
      read:     '5 min read',
      img:      'assets/images/hero/business-person-futuristic-business-environment_23-2150970181.jpg',
      url:      'news/empowering-your-progress-how-hnb-investment-bank-is-driving-the-evolution-of-bespoke-investment-solutions.html'
    },
    {
      title:    'Dansala 2025 — HNB Investment Bank Gives Back',
      excerpt:  'HNB Investment Bank\'s annual Dansala returns for 2025, bringing the team together in community spirit and service.',
      category: 'Company News',
      date:     '2025',
      read:     '3 min read',
      img:      'assets/images/content/business-people-board-room-meeting_53876-138090.jpg',
      url:      'news/dansala-2025.html'
    },
    {
      title:    'Career Event 2025 — A Day of Sport and Recognition',
      excerpt:  'A celebration of team spirit, achievement, and the people who make HNB Investment Bank great.',
      category: 'Company News',
      date:     '2025',
      read:     '3 min read',
      img:      'assets/images/hero/Home-page-slider-1-1.webp',
      url:      'news/career-event-2025.html'
    },
    {
      title:    'HNB Investment Bank and Serendib Frontier Capital Spearhead Full Subscription of Singer Finance LKR 2 Bn Offering',
      excerpt:  'HNB IB and Serendib Frontier Capital lead the full subscription of Singer Finance\'s subordinated debt offering — a landmark 2024 transaction.',
      category: 'Corporate Finance',
      date:     '2024',
      read:     '4 min read',
      img:      'assets/images/hero/african-business-male-people-shaking-hands-scaled.webp',
      url:      'news/singer-finance-lkr2bn-debt-offering.html'
    },
    {
      title:    'HNB Investment Bank Extends Collaboration with CFA Society Sri Lanka as Silver Partner',
      excerpt:  'HNB Investment Bank reaffirms its commitment to developing investment professionals across Sri Lanka\'s capital markets.',
      category: 'Partnership',
      date:     '2024',
      read:     '3 min read',
      img:      'assets/images/hero/hnbib-cc-1024x808.webp',
      url:      'news/hnb-investment-bank-extends-collaboration-with-cfa-society-sri-lanka-as-silver-partner.html'
    },
    {
      title:    'HNB Investment Bank Facilitates Sri Lanka\'s First-Ever High-Yield Bond Issuance for Fintrex Finance',
      excerpt:  'A landmark transaction that opened a new fixed-income instrument class for Sri Lanka\'s domestic finance sector.',
      category: 'Corporate Finance',
      date:     '2023',
      read:     '4 min read',
      img:      'assets/images/hero/stylish-soft-blue-curve-lines-abstract-background_1017-19950.jpg',
      url:      'news/hnb-investment-bank-facilitates-sri-lankas-first-ever-high-yield-bond-issuance-for-fintrex-finance.html'
    },
    {
      title:    'HNB Investment Bank Powers Alpha Fire Services\' Journey from Historic CSE Listing to Sale of Controlling Interest',
      excerpt:  'A full-cycle capital markets engagement — from IPO on the CSE to the structured sale of a controlling stake.',
      category: 'Corporate Finance',
      date:     '2023',
      read:     '4 min read',
      img:      'assets/images/hero/slider1-scaled.webp',
      url:      'news/hnb-investment-bank-powers-alpha-fire-services-journey-from-historic-cse-listing-to-sale-of-controlling-interest-2.html'
    },
    {
      title:    'HNB Investment Bank Promotes Hayleys Rs 7 Billion Debenture Issue as Joint Placement Agent',
      excerpt:  'HNB Investment Bank acts as joint placement agent on one of Sri Lanka\'s largest private debt transactions.',
      category: 'Corporate Finance',
      date:     '2022',
      read:     '3 min read',
      img:      'assets/images/hero/hnbib-cc-1024x808.webp',
      url:      'news/hnb-investment-bank-promotes-hayleys-rs-7-billion-debenture-issue-as-joint-placement-agent.html'
    }
  ];

  var PER_PAGE    = 4;
  var currentPage = 1;
  var currentCat  = 'all';

  /* ── Helpers ─────────────────────────────────────────────────── */
  function filtered() {
    return currentCat === 'all'
      ? POSTS
      : POSTS.filter(function (p) { return p.category === currentCat; });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Render featured card ────────────────────────────────────── */
  function featuredHTML(p) {
    return '<a href="' + p.url + '" class="nc-featured">' +
      '<div class="nc-featured-img">' +
        '<img src="' + p.img + '" alt="' + esc(p.title) + '" loading="eager">' +
        '<div class="nc-featured-img-overlay"></div>' +
        '<div class="nc-featured-badge">Featured</div>' +
      '</div>' +
      '<div class="nc-featured-body">' +
        '<span class="nc-featured-tag">' + esc(p.category) + '</span>' +
        '<div class="nc-featured-title">' + esc(p.title) + '</div>' +
        '<div class="nc-featured-excerpt">' + esc(p.excerpt) + '</div>' +
        '<div class="nc-featured-meta">' + esc(p.date) + ' &middot; ' + esc(p.read) + '</div>' +
        '<div class="nc-featured-cta">Read article <span aria-hidden="true">→</span></div>' +
      '</div>' +
    '</a>';
  }

  /* ── Render regular card ─────────────────────────────────────── */
  function cardHTML(p) {
    return '<a href="' + p.url + '" class="nc">' +
      '<div class="nc-img">' +
        '<img src="' + p.img + '" alt="' + esc(p.title) + '" loading="lazy">' +
        '<div class="nc-img-overlay"></div>' +
      '</div>' +
      '<div class="nc-body">' +
        '<div class="nc-tag">' + esc(p.category) + '</div>' +
        '<div class="nc-title">' + esc(p.title) + '</div>' +
        '<div class="nc-footer">' +
          '<span class="nc-meta">' + esc(p.date) + ' &middot; ' + esc(p.read) + '</span>' +
          '<span class="nc-read">Read <span aria-hidden="true">→</span></span>' +
        '</div>' +
      '</div>' +
    '</a>';
  }

  /* ── Render pagination ───────────────────────────────────────── */
  function renderPagination(totalPages) {
    var el = document.getElementById('news-pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    var html = '<button class="pg-btn" id="pg-prev" aria-label="Previous page"' +
      (currentPage === 1 ? ' disabled' : '') + '>← Prev</button>';

    for (var i = 1; i <= totalPages; i++) {
      html += '<button class="pg-btn' + (i === currentPage ? ' active' : '') +
        '" data-pg="' + i + '" aria-label="Page ' + i + '" aria-current="' + (i === currentPage ? 'page' : 'false') + '">' + i + '</button>';
    }

    html += '<button class="pg-btn" id="pg-next" aria-label="Next page"' +
      (currentPage === totalPages ? ' disabled' : '') + '>Next →</button>';

    el.innerHTML = html;

    el.querySelector('#pg-prev').addEventListener('click', function () {
      if (currentPage > 1) { currentPage--; render(true); }
    });
    el.querySelector('#pg-next').addEventListener('click', function () {
      if (currentPage < totalPages) { currentPage++; render(true); }
    });
    el.querySelectorAll('[data-pg]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var pg = parseInt(this.getAttribute('data-pg'), 10);
        if (pg !== currentPage) { currentPage = pg; render(true); }
      });
    });
  }

  /* ── Main render ─────────────────────────────────────────────── */
  function render(scrollUp) {
    var list       = filtered();
    var total      = list.length;
    var totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;

    var start     = (currentPage - 1) * PER_PAGE;
    var pagePosts = list.slice(start, start + PER_PAGE);

    /* Count label */
    var countEl = document.getElementById('news-count');
    countEl.textContent = total + ' article' + (total !== 1 ? 's' : '') +
      (currentCat !== 'all' ? ' in ' + currentCat : '');

    /* Fade wrapper */
    var grid = document.getElementById('news-grid');
    grid.classList.add('fading');

    setTimeout(function () {
      if (pagePosts.length === 0) {
        grid.innerHTML = '<div class="news-empty">' +
          '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
          '<p>No articles in this category yet.</p></div>';
      } else {
        var html = featuredHTML(pagePosts[0]);
        var rest = pagePosts.slice(1);
        if (rest.length) {
          html += '<div class="news-cards-grid">';
          rest.forEach(function (p) { html += cardHTML(p); });
          html += '</div>';
        }
        grid.innerHTML = html;
      }

      grid.classList.remove('fading');
      renderPagination(totalPages);

      if (scrollUp) {
        var sec = document.getElementById('news-archive-section');
        if (sec) {
          var top = sec.getBoundingClientRect().top + window.pageYOffset - 90;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
      }
    }, 220);
  }

  /* ── Filter button events ────────────────────────────────────── */
  document.querySelectorAll('.news-filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.news-filter-btn').forEach(function (b) {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      this.classList.add('active');
      this.setAttribute('aria-selected', 'true');
      currentCat  = this.getAttribute('data-cat');
      currentPage = 1;
      render(false);
    });
  });

  /* ── Boot ────────────────────────────────────────────────────── */
  render(false);

})();
</script>

</body></html>
